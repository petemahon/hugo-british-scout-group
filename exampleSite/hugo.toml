# exampleSite/hugo.toml - copy this into your Group's site as a starting point.
# Lines marked "# CHANGE ME" are the ones you should edit.

baseURL      = "https://example.com/"             # CHANGE ME
title        = "1st Anytown Scouts"               # CHANGE ME
theme        = "british-scout-group"

enableRobotsTXT = true

# This theme is hardcoded to British English (en-GB). The <html lang="en-GB">
# attribute is set in baseof.html - do not configure other locales.

# Suppress Hugo's auto-generated taxonomy term/list pages. The shared
# `section = "sections"` taxonomy (see [taxonomies] below) is used for
# tagging and filtering, but the user-visible filter pages are
# per-content-type at /news/sections/<scout-section>/ etc., shipped as
# Hugo content sections by the theme. See SPEC-01 / SPEC-COMMON §8.
disableKinds = ["taxonomy", "term"]

# Hugo 0.156+ syntax. Pagination is not used by this theme but kept here for
# Group sites that grow to multiple pages.
[pagination]
  pagerSize = 10

# Required by some Hugo features when the theme uses safeHTML in front-matter
# fields (e.g. text containing <strong> or <a>).
[markup.goldmark.renderer]
  unsafe = true

# -----------------------------------------------------------------------------
# Custom output formats - used by the Events feature (SPEC-02).
#
#   EventCalendar              - per-event .ics, rendered as event.ics next
#                                to each event's index.html.
#   EventsAggregateCalendar    - single feed of all upcoming events,
#                                rendered at /events/all.ics so parents can
#                                subscribe once.
#   Calendar                   - generic .ics output format kept available
#                                for any future per-page calendar use.
#
# Wired up via `outputs` and a `[cascade]` block in
# content/events/_index.md. See SPEC-02.
# -----------------------------------------------------------------------------
[mediaTypes."text/calendar"]
  suffixes = ["ics"]

[outputFormats.Calendar]
  mediaType      = "text/calendar"
  isPlainText    = true
  notAlternative = true

[outputFormats.EventCalendar]
  mediaType      = "text/calendar"
  baseName       = "event"
  isPlainText    = true
  notAlternative = true

[outputFormats.EventsAggregateCalendar]
  mediaType      = "text/calendar"
  baseName       = "all"
  isPlainText    = true
  notAlternative = true

# Welcome Pack - concatenated printable view (SPEC-06).
# Rendered at /welcome-pack/print.html by layouts/welcome-pack/list.welcomepackprint.html.
# Enabled on the welcome-pack section via `outputs = […]` in its _index.md.
[outputFormats.WelcomePackPrint]
  mediaType      = "text/html"
  baseName       = "print"
  isHTML         = true
  notAlternative = true

# Kit lists - per-list printable checkbox view (SPEC-05).
# Rendered at /kit-lists/<slug>/print.html by single.kitlistprint.html.
# Enabled on every kit-list page via the [cascade] in
# content/kit-lists/_index.md.
[outputFormats.KitListPrint]
  mediaType      = "text/html"
  baseName       = "print"
  isHTML         = true
  notAlternative = true

# -----------------------------------------------------------------------------
# Theme params
# -----------------------------------------------------------------------------
[params]
  # Pick one of: classic-purple, adventure, coastal, vibrant, network
  # Or add your own to data/palettes.toml. See /palettes/ for a visual ref.
  
  palette         = "adventure"

  # ── Group identity used by the hero (SPEC: hero, deliverable 4) ─────────
  # The home-page hero splits the site title into three pieces so the
  # optional intro animation can fly the "prefix" portion up to the nav.
  # Keeping the split consistent with `title` is the author's responsibility
  # - the theme does not validate it.
  #
  #   Convention:  title  ==  groupPrefix + " " + groupSuffix
  #
  #   Example:   title         = "1st Anytown Scouts"   (top of this file)
  #              groupPrefix   = "1st Anytown"          (the part that flies)
  #              groupSuffix   = "Scouts"               (the part that stays)
  #
  # `place` drives the default hero eyebrow, rendered as
  # "Skills for life · {place}". Leave it unset to show just "Skills for life".
  # An individual hero section can still override the eyebrow per-page via
  # `eyebrow = "…"` in content/_index.md.
  groupPrefix     = "1st Anytown"                       # CHANGE ME
  groupSuffix     = "Scouts"                            # CHANGE ME
  place           = "Anytown"                           # CHANGE ME

  # Opt-in scroll-driven em-flight animation on the home page. Requires
  # groupPrefix + groupSuffix in [params]. Without them, a build-time warnf
  # fires and the heading falls back to a single un-split <h1>. Degrades
  # gracefully on pre-Baseline-2026 browsers and honours prefers-reduced-motion.

  heroIntro = true

  description     = "Skills for Life - placeholder description for the example Scout Group site."
  favicon         = "images/favicon.png"               # CHANGE ME (optional)

  copyrightOwner  = "1st Anytown Scouts"               # CHANGE ME
  copyrightRights = "All Rights Reserved"

  # Note: pre-D13 the footer accepted a `footerBg` param controlling
  # background tone (muted/primary/.../dark). D13 made the footer a
  # brand-anchor surface - always Scouts Navy regardless of palette -
  # and the param is now ignored. Removed here; safe to delete from
  # consuming sites.

# -----------------------------------------------------------------------------
# Footer - see partials/footer.html for schema. All fields optional.
# Up to four columns; the responsive grid handles 1/2/4 col layouts.
# -----------------------------------------------------------------------------
[params.footer]
  tagline = "Skills for life in Anytown - and a slice of UK Scouting wherever you call home."

  [[params.footer.columns]]
    heading = "Visit"
    items = [
      { label = "Anytown Scout Hut" },
      { label = "11 Hut Lane" },
      { label = "Anytown" },
    ]

  [[params.footer.columns]]
    heading = "Contact"
    items = [
      { label = "hello@anytown-scouts.org", url = "mailto:hello@anytown-scouts.org" },
      { label = "+44 1234 567 890",          url = "tel:+441234567890" },
      { label = "Instagram",                  url = "https://instagram.com/example" },
    ]

  [[params.footer.columns]]
    heading = "About"
    items = [
      { label = "Safeguarding",            url = "https://www.scouts.org.uk/information-for-parents/keeping-children-and-young-people-safe/how-we-safeguard-young-people-in-scouts/" },
      { label = "Privacy",                 url = "/privacy/" },
    ]
    # Charity number is rendered by the charity-info block (SPEC-07), driven
    # by [params.governance] - no need to hardcode it as a footer item.

# -----------------------------------------------------------------------------
# BSO membership notice (POR 3.2.1.1)
# Set hostCountryName + hostScoutingAssociation for your host country.
# Wording lives in i18n strings; override in i18n/en.toml at site root.
# -----------------------------------------------------------------------------
[params.bsoMembershipNotice]
  enable                  = true
  hostCountryName         = "the United Arab Emirates"  # CHANGE ME
  hostScoutingAssociation = "Emirates Scout Association" # CHANGE ME

# -----------------------------------------------------------------------------
# BSO - site-level master switch + Joining Hub (SPEC-10) config.
#
# `enabled` is the site-wide master switch for every BSO render path:
#   - the bso-membership-notice partial (also separately enabled via
#     [params.bsoMembershipNotice].enable below);
#   - the BSO branch on /join/ joining cards (per-pack language and
#     nationality notes from data/sections_status.toml);
#   - the entire /bso/ Joining Hub, which itself further gates via
#     params.features.bso_hub.
# Default false. The example site flips it true to exercise every BSO
# render path. UK-only Groups leave it off and never encounter BSO.
#
#   host_country_iso        ISO 3166-1 alpha-2, lowercase. Used to load
#                           data/bso/alternatives/<iso>.toml for the
#                           host-scouting page. Theme ships starter
#                           data for nl, be, fr, de, es, ae, sg, us.
#   host_country_name       Display label (article allowed, e.g.
#                           "the United Arab Emirates").
#   host_association        Name of the WOSM-recognised NSO in the
#                           host country (also surfaced in the
#                           bso-membership-notice partial).
#   show_home_range         When true, /bso/home-range/ renders an
#                           InTouch-policy summary plus static map.
#                           Default false (most Groups don't need this).
#   show_host_alternatives  When true, /bso/host-scouting/ renders.
#                           Default true.
#   district / district_url BSO Area district context (e.g. "Middle
#                           East and Asia"). Surfaced in the bso-links
#                           footer alongside the BSO Area link.
#   bso_area_url            BSO Area site root.
# -----------------------------------------------------------------------------
[params.bso]
  enabled                = true
  host_country_iso       = "ae"
  host_country_name      = "the United Arab Emirates"
  host_association       = "Emirates Scout Association"
  show_home_range        = false
  show_host_alternatives = true
  district               = "Middle East and Asia"
  district_url           = "https://www.britishscoutingoverseas.org.uk/"
  bso_area_url           = "https://www.britishscoutingoverseas.org.uk/"

# -----------------------------------------------------------------------------
# Scout Sections - toggle which sections your Group runs.
#
# That's it. Logos ship with the theme - you don't need to download or
# configure them. Brand asset maintenance is centralised in the theme repo.
# -----------------------------------------------------------------------------
[params.scoutSections]
  squirrels = { enable = true }
  beavers   = { enable = true }
  cubs      = { enable = true }
  scouts    = { enable = true }
  explorers = { enable = true }
  network   = { enable = false }   # opt-in; default off (see DECISIONS.md)

# -----------------------------------------------------------------------------
# Feature flags - every theme feature defaults OFF and is opted into here.
# Set to true ONLY when your Group has the editorial commitment to maintain
# the feature: stale published content damages credibility more than no
# content. The exampleSite turns everything on so the demo exercises every
# feature. See DECISIONS.md for the full rationale.
# -----------------------------------------------------------------------------
[params.features]
  news              = true
  events            = true
  programme         = true
  joining           = true
  welcome_pack      = true
  bso_hub           = true
  network_feature   = true
  volunteer_feature = true
  galleries         = true
  kit_lists         = true
  history           = true
  governance        = true
  trustee_minutes   = true
  fundraising       = true
  hall_hire         = true


# -----------------------------------------------------------------------------
# News & Camp Reports - see SPEC-01.
# -----------------------------------------------------------------------------
[params.news]
  posts_per_page        = 12     # listing page pagination
  default_count_on_home = 3      # default cards in the news-grid home block
  show_author           = true   # render leader nickname/role in byline
  show_reading_time     = false  # pure-Hugo, no JS

# -----------------------------------------------------------------------------
# Events with .ics download - see SPEC-02.
#   timezone              IANA TZ used for events that don't override it.
#   show_past_archive     If true, /events/past/ is built (a sub-section
#                         that uses the same list template with archive=true).
#   upcoming_window_days  Reserved for future use - listings are currently
#                         filtered by `Date >= now`.
#   default_count_on_home Default `count` for the events-upcoming home block.
# -----------------------------------------------------------------------------
[params.events]
  timezone              = "Europe/London"
  show_past_archive     = false
  upcoming_window_days  = 365
  default_count_on_home = 4

# -----------------------------------------------------------------------------
# Termly Programme - see SPEC-03.
#   keep_archive                  If true, past terms (term_end < today)
#                                 remain on /programme/. Default false.
#   default_density               Site-wide default for per-programme density.
#                                 "themes_only" (safer) | "full" (with notes).
#   show_district_approved_badge  Render the small POR 9.1.2.1 badge on
#                                 programmes whose front-matter sets
#                                 district_approved = true.
#   show_theme_chips              Master switch for chip rendering; set
#                                 false to drop chips everywhere.
# -----------------------------------------------------------------------------
[params.programme]
  keep_archive                  = true
  default_density               = "themes_only"
  show_district_approved_badge  = true
  show_theme_chips              = true

# -----------------------------------------------------------------------------
# Joining & Waiting List - see SPEC-06.
#   show_currency        Render the currency symbol on every fee value.
#                        Set false if your Group quotes a single currency
#                        and would rather not repeat it on every card.
#   card_layout          "grid" (default) | "stacked".
#   show_volunteer_link  Renders the /#volunteer bridge in the page-head
#                        button row. Bridges SPEC-06 to SPEC-09.
# -----------------------------------------------------------------------------
[params.joining]
  show_currency        = true
  card_layout          = "grid"
  show_volunteer_link  = true

# -----------------------------------------------------------------------------
# Welcome Pack - see SPEC-06.
#   print_route          Generate /welcome-pack/print.html (a single
#                        concatenated HTML document). Default true.
# -----------------------------------------------------------------------------
[params.welcome_pack]
  print_route = true

# -----------------------------------------------------------------------------
# Galleries - see SPEC-04.
#   thumbs_per_row      Hint for the CSS Grid auto-fit (purely visual; the
#                       grid is responsive regardless).
#   show_captions       When true, captions in data/galleries/<slug>.toml
#                       are surfaced over thumbnails on /galleries/<slug>/.
#   show_consent_link   Render a footer link to the photo-consent policy
#                       below each gallery grid.
#   consent_policy_url  Path to the photo-consent policy page on this site.
# -----------------------------------------------------------------------------
[params.galleries]
  thumbs_per_row     = 4
  show_captions      = true
  show_consent_link  = true
  consent_policy_url = "/policies/photo-consent/"

# -----------------------------------------------------------------------------
# Kit lists - see SPEC-05.
#   printable_route            Emit the /kit-lists/<slug>/print.html checkbox
#                              view (requires the KitListPrint output format
#                              above + the [cascade] in the section _index).
#   show_phone_policy_default  When true, kit lists that don't set
#                              `phone_policy` in front-matter still render the
#                              mobile-phone-policy block. Default false - each
#                              Group affirmatively opts in.
#   default_phone_policy_text  Overrides the theme's neutral i18n default copy.
#                              Leave blank to use the theme default.
# -----------------------------------------------------------------------------
[params.kit_lists]
  printable_route           = true
  show_phone_policy_default = false
  default_phone_policy_text = ""

# -----------------------------------------------------------------------------
# Governance / charity info - see SPEC-07.
#   show_in_footer  When true (and features.governance is on AND a charity
#                   number is set), the charity-info block renders in every
#                   non-printing footer. A charity number never surfaces
#                   without a governance page; a governance page can exist
#                   with no charity listed.
#   charity_*       Primary registration. This example uses British Scouting
#                   Overseas' real England & Wales charity number - most BSO
#                   Groups operate under it rather than registering separately.
#   charity_secondary_*  Optional second jurisdiction (e.g. a BSO Group that
#                   is ALSO a host-country legal entity - 1st Brussels is a
#                   Belgian ASBL, BE1013020290). Left off here; uncomment and
#                   set charity_secondary = true to exercise the dual block.
# -----------------------------------------------------------------------------
[params.governance]
  show_in_footer = true
  charity_number = "1151702"
  charity_name   = "British Scouting Overseas"
  regulator      = "Charity Commission for England and Wales"
  charity_url    = "https://register-of-charities.charitycommission.gov.uk/charity-search/-/charity-details/1151702"
  # charity_secondary           = true
  # charity_secondary_number    = "BE1013020290"
  # charity_secondary_regulator = "Belgium (ASBL)"
  # charity_secondary_url       = ""

# -----------------------------------------------------------------------------
# Trustee Board meeting summaries - see SPEC-13.
#   Requires features.governance AND features.trustee_minutes (both above).
#   Publishes SHORT, redacted PUBLIC SUMMARIES of board decisions at
#   /about/governance/minutes/ - never the full minutes (those stay private;
#   write them from documentation/templates/trustee-minutes-template.md).
#   Each summary is a content file in content/about/minutes/ with
#   `approved = true`; unapproved/draft files never publish.
#   level  Scouting level of THIS charity, used to label the archive:
#          "group" | "district" | "county" (County / Area / Region).
# -----------------------------------------------------------------------------
[params.minutes]
  level = "group"

# -----------------------------------------------------------------------------
# Wogglebox partner badge - opt-in "We use Wogglebox" badge near the home
# footer and on /kit-lists/. Wogglebox (wogglebox.app) is an independent, free
# kit / quartermaster manager for Scout Groups. The badge SVG is self-hosted
# (assets/images/wogglebox/) so no third-party request fires on page load; the
# utm_* link only fires on click. Default OFF in the theme.
# -----------------------------------------------------------------------------
[params.wogglebox]
  enabled = true
  url     = "https://wogglebox.app/?utm_source=group-website&utm_medium=badge&utm_campaign=we-use-wogglebox"

# -----------------------------------------------------------------------------
# Fundraising & volunteering - see SPEC-09.
#   show_giftaid                         Render the Gift Aid PDF link when set.
#   show_external_links_section_heading  Heading above the giving-links block.
# The "We're recruiting" conditional nav link is owned by SPEC-11 (it
# rebuilds the nav); the [params.volunteer_roles] block below ships now so
# the config is stable, and SPEC-11 consumes it. SPEC-09 already shows the
# conditional homepage recruitment banner.
# -----------------------------------------------------------------------------
[params.fundraising]
  show_giftaid                        = true
  show_external_links_section_heading = true

[params.volunteer_roles]
  nav_link       = true                # consumed by SPEC-11's nav
  nav_link_label = "We're recruiting"

# -----------------------------------------------------------------------------
# Hall hire - see SPEC-08.
#   show_currency_symbol  Prefix rate amounts with the currency symbol
#                         (from data/currencies.toml).
#   fully_booked          When true, renders the --warning banner at the top
#                         of /hall-hire/ and signals no new enquiries. The
#                         page still renders in full. Flip to true to preview.
# -----------------------------------------------------------------------------
[params.hall_hire]
  show_currency_symbol = true
  fully_booked         = false

# -----------------------------------------------------------------------------
# Taxonomies - single shared taxonomy across content types per SPEC-COMMON §8.
# The values are the keys from data/scout_sections.toml. The auto-generated
# taxonomy term/list pages are suppressed via top-level disableKinds (above);
# user-visible filter pages live at /news/sections/<scout-section>/ etc.
# -----------------------------------------------------------------------------
[taxonomies]
  section = "sections"

# -----------------------------------------------------------------------------
# Navigation (SPEC-11) is AUTO-BUILT from the feature flags above - there is
# no [[menu.main]] to curate. Turning a feature on adds its nav entry;
# turning it off removes it. Labels are customised via i18n (nav* keys);
# order and hierarchy are owned by the theme.
#
# Optionally hide a specific auto-entry without disabling its feature
# (all default true):
#   [params.nav]
#     show_join_us       = true
#     show_our_sections  = true
#     show_what_we_do    = true
#     show_get_involved  = true
#     show_about         = true
#     show_where_we_meet = true
# -----------------------------------------------------------------------------
