# data/scout_sections.toml — the standard UK Scout sections.
#
# This file defines the fixed metadata for each Scout section: the official
# age range, scouts.org.uk URL, accessibility alt text, and the path to the
# official Scouts brand logo SHIPPED WITH THIS THEME under
# `assets/images/sections/`.
#
# Group sites DO NOT edit this file. Per-Group settings (enable on/off only)
# live in your site's hugo.toml under [params.scoutSections]:
#
#     [params.scoutSections]
#       squirrels = { enable = true }
#       beavers   = { enable = true }
#       ...
#
# Order here = render order, mirroring The Scout Association's canonical
# ordering: Squirrels → Network.
#
# Logos are official Scouts brand assets, downloaded from
# https://scoutsbrand.org.uk by the theme maintainer. Groups should NOT
# substitute their own logos — the brand is centrally controlled.
# (An optional per-Group `logo` override exists in the partial for edge
# cases, but it isn't documented in the public README.)

[[items]]
  key  = "squirrels"
  name = "Squirrels"
  ages = "4 to 6 years"
  logo = "images/sections/squirrels.webp"
  url  = "https://www.scouts.org.uk/squirrels"
  alt  = "Logo for Squirrels Section"

[[items]]
  key  = "beavers"
  name = "Beavers"
  ages = "6 to 8 years"
  logo = "images/sections/beavers.webp"
  url  = "https://www.scouts.org.uk/beavers"
  alt  = "Logo for Beavers Section"

[[items]]
  key  = "cubs"
  name = "Cubs"
  ages = "8 to 10 ½ years"
  logo = "images/sections/cubs.webp"
  url  = "https://www.scouts.org.uk/cubs"
  alt  = "Logo for Cubs Section"

[[items]]
  key  = "scouts"
  name = "Scouts"
  ages = "10 ½ to 14 years"
  logo = "images/sections/scouts.webp"
  url  = "https://www.scouts.org.uk/scouts"
  alt  = "Logo for Scouts Section"

[[items]]
  key  = "explorers"
  name = "Explorers"
  ages = "14 to 18 years"
  logo = "images/sections/explorers.webp"
  url  = "https://www.scouts.org.uk/explorers"
  alt  = "Logo for Explorers Section"
