# data/scout_sections.toml — the standard UK Scout sections.
#
# This file defines the fixed metadata for each Scout section: the official
# age range, scouts.org.uk URL, accessibility alt text, identity colours,
# and the path to the official Scouts brand logo SHIPPED WITH THIS THEME
# under `assets/images/sections/`.
#
# Group sites DO NOT edit this file. Per-Group settings (enable on/off only)
# live in your site's hugo.toml under [params.scoutSections]:
#
#     [params.scoutSections]
#       squirrels = { enable = true }
#       beavers   = { enable = true }
#       ...
#
# Order here = render order, mirroring The Scout Association's canonical
# ordering: Squirrels → Network.
#
# blurb
# -----
# One short, Group-generic line describing what the section does. Shown in
# the vertical desktop card on the `scout-sections` home block (hidden on the
# compact mobile rows). Optional — omit to fall back to the logo + age only.
#
# Identity colours
# ----------------
# `colour` is the section's identity background colour (sourced from the
# outer ring of each section's challenge badge, with brand-book substitutions
# where Peter specified by name — see DECISIONS.md). `text_colour` is the
# foreground colour to use on top of `colour`, chosen to meet WCAG AA
# contrast for badge-pill labels. These are used on news cards, event
# cards, gallery covers, joining cards, and anywhere else a section is
# badged.
#
# default_enabled
# ---------------
# Controls whether a section card auto-renders in the `scout-sections`
# home-page block. Default is true (omit the field to keep the historical
# behaviour). Network is the only section with `default_enabled = false`:
# Network (18–25) is a separate provision from the under-18 youth sections
# and most Groups do not run a Network. A Group running a Network opts in
# explicitly with `[params.scoutSections] network = { enable = true }`.
#
# Network's metadata (colour, URL, etc.) is still loaded for any feature
# that needs to render a Network badge — e.g. tagging a news post about a
# Network event. Only the home-page card is suppressed by default.
#
# Logos are official Scouts brand assets, downloaded from
# https://scoutsbrand.org.uk by the theme maintainer. Groups DO NOT
# substitute their own logos — the brand is centrally controlled and
# the partial does not read a per-Group `logo` override.

[[items]]
  key         = "squirrels"
  name        = "Squirrels"
  ages        = "4 to 6 years"
  blurb       = "First steps into the outdoors — games, friendship and giving everything a go."
  logo        = "images/sections/squirrels.svg"
  url         = "https://www.scouts.org.uk/squirrels"
  alt         = "Logo for Squirrels Section"
  color       = "#25B755"
  text_color  = "#000000"

[[items]]
  key         = "beavers"
  name        = "Beavers"
  ages        = "6 to 8 years"
  blurb       = "Crafts, games and the first taste of camp, where lifelong friendships start."
  logo        = "images/sections/beavers.svg"
  url         = "https://www.scouts.org.uk/beavers"
  alt         = "Logo for Beavers Section"
  color       = "#003982"
  text_color  = "#FFFFFF"

[[items]]
  key         = "cubs"
  name        = "Cubs"
  ages        = "8 to 10 ½ years"
  blurb       = "Hikes, badges and first sleepovers — plenty of chances to get stuck in."
  logo        = "images/sections/cubs.svg"
  url         = "https://www.scouts.org.uk/cubs"
  alt         = "Logo for Cubs Section"
  color       = "#F7EF27"
  text_color  = "#000000"

[[items]]
  key         = "scouts"
  name        = "Scouts"
  ages        = "10 ½ to 14 years"
  blurb       = "Bigger expeditions, real responsibility and the chance to lead the adventure."
  logo        = "images/sections/scouts.svg"
  url         = "https://www.scouts.org.uk/scouts"
  alt         = "Logo for Scouts Section"
  color       = "#E22E12"
  text_color  = "#FFFFFF"

[[items]]
  key         = "explorers"
  name        = "Explorers"
  ages        = "14 to 18 years"
  blurb       = "Self-led units, top awards and international travel — the path to King's Scout."
  logo        = "images/sections/explorers.svg"
  url         = "https://www.scouts.org.uk/explorers"
  alt         = "Logo for Explorers Section"
  color       = "#088486"
  text_color  = "#FFFFFF"

[[items]]
  key             = "network"
  name            = "Network"
  ages            = "18 to 25 years"
  blurb           = "Awards, expeditions and a community that gets it — Scouting on your terms."
  logo            = "images/sections/network.svg"
  url             = "https://www.scouts.org.uk/network/"
  alt             = "Logo for Scout Network"
  color           = "#000000"
  text_color      = "#FFFFFF"
  default_enabled = false
