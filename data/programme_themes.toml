# data/programme_themes.toml - Skills for Life curriculum themes
#
# Used by SPEC-03 (Termly Programme). Each [[theme]] block defines one
# chip rendered next to a meeting title in a published programme, plus
# (optionally) an outbound link to the Scouts UK explanatory page.
#
# Groups DO NOT edit this file - the theme list is part of the theme
# bundle and updates flow via submodule bumps. Per-meeting tagging is
# done in each programme's front-matter under [[weeks]].themes.
#
# Provenance
# ----------
# The list below is the illustrative set captured in SPEC-03
# (documentation/specs/SPEC-03-programme.md, May 2026). It blends the
# Scouts UK "Skills for life areas" curriculum themes with the four
# top-line outcome statements ("have adventures", "try new things",
# "live up to our values"). TODO: before a Group adopts SPEC-03 in
# production, reconcile this list against the live Scouts UK
# Programme Planner - https://www.scouts.org.uk/programme-planner/
# - and adjust keys / labels / scouts_url values to match the
# current canonical taxonomy. The renderer accepts any keys: the
# only contract is that every key referenced by a programme's
# [[weeks]].themes exists here, and every theme has a palette token
# that resolves under the active palette.
#
# Palette mapping
# ---------------
# `palette` selects the chip background colour from the active palette:
#   primary    --primary    + text-on-primary
#   secondary  --secondary  + text-on-secondary
#   tertiary   --tertiary   + #ffffff
#   accent     --accent     + #000000
# Eight themes share four tokens. The rotation below is deliberate:
# themes that read as "core curriculum" use --primary / --secondary,
# themes that read as "outdoor / adventurous" use --tertiary, themes
# that read as "values-led / try new things" use --accent. Don't
# rebalance without checking the contrast on every palette preset.

[[theme]]
  key        = "skills-for-life"
  label      = "Skills for life"
  palette    = "primary"
  scouts_url = "https://www.scouts.org.uk/skills-for-life/"

[[theme]]
  key        = "beliefs-and-attitudes"
  label      = "Beliefs and attitudes"
  palette    = "secondary"

[[theme]]
  key        = "outdoor-and-adventure"
  label      = "Outdoor and adventure"
  palette    = "tertiary"

[[theme]]
  key        = "community-impact"
  label      = "Community impact"
  palette    = "accent"

[[theme]]
  key        = "teamwork-and-leadership"
  label      = "Teamwork and leadership"
  palette    = "secondary"

[[theme]]
  key        = "have-adventures"
  label      = "Have adventures"
  palette    = "tertiary"

[[theme]]
  key        = "try-new-things"
  label      = "Try new things"
  palette    = "accent"

[[theme]]
  key        = "live-up-to-our-values"
  label      = "Live up to our values"
  palette    = "primary"
