# data/bso/alternatives/nl.toml - WOSM-recognised scouting in the Netherlands.
# Used by SPEC-10's /bso/host-scouting/ page when host_country_iso = "nl".
# Verify links and names before publishing - the theme ships this as a
# starter set; URLs and federations drift over time.

[[organisation]]
  name        = "Scouting Nederland"
  url         = "https://www.scouting.nl/"
  language    = "Dutch"
  joining_url = "https://www.scouting.nl/word-lid"
  description = "The national WOSM-recognised scouting body of the Netherlands, with groups across the country."

[[organisation]]
  name        = "FOS Open Scouting"
  url         = "https://www.fos.be/"
  language    = "Dutch / French"
  joining_url = ""
  description = "Federation of Open Scouts - operates in Belgium with some cross-border presence; not WOSM-recognised in the Netherlands but a useful neighbour reference."
