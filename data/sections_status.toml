  meeting_end          = "19:30"
  fee                  = "40"
  fee_currency         = "GBP"
  fee_period           = "term"
  contact_email        = "cubs-wed@1stanytown.org.uk"
  description          = "The Wednesday Pack has spaces for new Cubs joining in the Summer term. Sessions are a mix of badge work, games and outdoor activity."
  waiting_url          = ""
  bso_language         = "English"
  bso_nationality_note = "Open to children who aren't nationals of the host country (POR 3.2.1.1)."

[[cubs]]
  pack_name            = "Friday Pack"
  status               = "waiting"
  meeting_night        = "Friday"
  meeting_start        = "18:00"
  meeting_end          = "19:30"
  fee                  = "40"
