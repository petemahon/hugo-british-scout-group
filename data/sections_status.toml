# data/sections_status.toml — joining-page card data (SPEC-06).
#
# This file ships as a STARTER intended to be replaced wholesale by
# each consuming Group. The values below are generic placeholders
# matching the theme's "1st Anytown Scouts" example Group — fictional
# emails, fictional descriptions, generic "host country" phrasing in
# the BSO nationality notes. NOTHING here is country-specific; the
# host country is supplied at render time by the Group's hugo.toml
# via [params.bso].host_country_name (SPEC-10) and surfaced in the
# canonical bso-membership-notice partial on /join/.
#
# Each section (squirrels|beavers|cubs|scouts|explorers|network) is an
# ARRAY of pack records. Single-pack Groups have one entry per section;
# multi-pack Groups add more. `pack_name` renders only when populated,
# so a single-pack entry can leave it empty.
#
# Field reference
# ---------------
# pack_name             "" = single-pack section, no name shown
# status                "open" | "waiting" | "closed"
# meeting_night         "Monday" … "Sunday"
# meeting_start         "17:30" (24-hour)
# meeting_end           "18:30"
# fee                   Number as string, e.g. "30"
# fee_currency          ISO 4217 (default "GBP"). See data/currencies.toml.
# fee_period            "term" | "month" | "year"
# contact_email         Per-pack email (falls back to enquiry_email)
# description           HTML allowed; short paragraph describing the pack
# waiting_url           OSM waiting-list URL; used when status="waiting"
# bso_language          BSO only — language requirement, e.g. "English"
# bso_nationality_note  BSO only — eligibility blurb, linked to /bso/eligibility/
#
# The example site below exercises SPEC-06 acceptance criterion #9:
# Squirrels closed (not yet running), Beavers waiting list, Cubs
# multi-pack, Scouts/Explorers open. Network is opt-in via
# params.scoutSections; an example entry is provided commented-out.

# Squirrels — section not yet running this term ("closed" / informational)
[[squirrels]]
  pack_name            = ""
  status               = "closed"
  meeting_night        = "Monday"
  meeting_start        = "17:00"
  meeting_end          = "18:00"
  fee                  = "30"
  fee_currency         = "GBP"
  fee_period           = "term"
  contact_email        = "squirrels@1stanytown.org.uk"
  description          = "We're working towards opening a Squirrel Drey. If you'd like to register your interest, drop us a line and we'll let you know as soon as we have a date."
  waiting_url          = ""
  bso_language         = "English"
  bso_nationality_note = "Open to children who aren't nationals of the host country (POR 3.2.1.1)."

# Beavers — open waiting list
[[beavers]]
  pack_name            = ""
  status               = "waiting"
  meeting_night        = "Tuesday"
  meeting_start        = "17:30"
  meeting_end          = "18:30"
  fee                  = "35"
  fee_currency         = "GBP"
  fee_period           = "term"
  contact_email        = "beavers@1stanytown.org.uk"
  description          = "Beavers (age 6 to 8) meet on Tuesday evenings. We have a strong waiting list at present; add your child's name and we'll be in touch as soon as a place comes up."
  waiting_url          = "https://www.onlinescoutmanager.co.uk/parents/waiting-list/example-beavers"
  bso_language         = "English"
  bso_nationality_note = "Open to children who aren't nationals of the host country (POR 3.2.1.1)."

