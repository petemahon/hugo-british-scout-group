# data/trustees.toml — the Group's Trustee Board, shown on
# /about/governance/ (SPEC-07).
#
# Ships EMPTY by design — we don't publish placeholder names. Trustee
# names ARE public on the Charity Commission register, so listing them
# is legitimate, but NO contact details are rendered.
#
# Add one block per trustee:
#
# [[trustee]]
#   name      = "Jane Smith"
#   role      = "Chair of Trustees"
#   appointed = 2023            # year, optional
#
# [[trustee]]
#   name      = "Raj Patel"
#   role      = "Treasurer"
#   appointed = 2024
