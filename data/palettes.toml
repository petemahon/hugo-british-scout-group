# data/palettes.toml - Scout Brand colour presets
#
# All hex values are the OFFICIAL Scouts brand colours from the
# Scouts Brand Guidelines (Our Colours, 2023 edition).
# Source: https://scoutsbrand.org.uk
#
# Reference (do not edit - these are the brand truths):
#   Scouts Purple        #7413dc
#   Scouts Teal          #088486
#   Scouts Forest Green  #205b41
#   Scouts Green         #25b755
#   Scouts Red           #ed3f23
#   Scouts Pink          #ffb4e5
#   Scouts Navy          #003982
#   Scouts Blue          #006ddf
#   Scouts Yellow        #ffe627
#   Scouts Orange        #ff912a
#   Black                #000000
#   White                #ffffff
#
# Each palette below selects a Primary, Secondary and Tertiary from the
# brand list, plus an Accent. Hover variants are computed lighter shades.
# Text-on-colour values are chosen to meet WCAG AA contrast (per the
# brand guidelines' "Recommended combinations" page).
#
# --warning and --postponed are app-functionality colours, not brand
# palette entries. They are intentionally non-Scouts hex codes so they
# never collide with any section identity colour:
#   --warning   = #d4351c    Darker scarlet than Scouts Red, signals
#                            "alert / cancelled". Distinct from
#                            Scouts Red (#E22E12 = Scouts section colour).
#   --postponed = #d97706    Amber. Distinct from Scouts Orange
#                            (#ff912a = accent) and Cubs yellow
#                            (#F7EF27). Signals "delayed / paused".
#
# --status-open / --status-waiting / --status-closed (SPEC-06): the
# three joining-status badge colours. Uniform across every palette
# preset - status semantics shouldn't shift with the site's house
# colours. Distinct from --warning (red) and --postponed (amber):
#   --status-open    = #0a7b3a   Confident green, distinct from Scouts
#                                Green (#25b755 = Squirrels) and from
#                                Scouts Forest Green (#205b41).
#   --status-waiting = #b45309   Deeper amber than --postponed so a
#                                cross-page reader doesn't confuse
#                                "Waiting list" with "Postponed event".
#   --status-closed  = #6b7280   Neutral grey - "section not running"
#                                isn't a warning, it's informational.
#
# To add a palette: copy a block, give it a unique key, change the hexes.
# To select a palette: set palette = "<key>" in the site's hugo.toml params.

# -----------------------------------------------------------------------------
# Classic Purple - the canonical Scouts house palette.
# Closest match to the original adscouts.org colour scheme.
# -----------------------------------------------------------------------------
[classic-purple]
  name        = "Classic Purple"
  description = "Scouts Purple primary with Teal secondary. The default UK Scouts house style."
  primary           = "#7413dc"  # Scouts Purple
  primary_hover     = "#8e34ee"
  focus_ring        = "#7413dc"  # = primary; ~6.4:1 on white, meets AA (SPEC-12)
  secondary         = "#088486"  # Scouts Teal
  secondary_hover   = "#0bb3b6"
  tertiary          = "#205b41"  # Scouts Forest Green
  accent            = "#ff912a"  # Scouts Orange
  text              = "#14110e"
  text_muted        = "#45413a"
  text_on_primary   = "#ffffff"
  text_on_secondary = "#ffffff"
  bg                = "#ffffff"
  bg_muted          = "#f1efe9"
  warning           = "#d4351c"  # App scarlet - distinct from Scouts Red
  text_on_warning   = "#ffffff"
  postponed         = "#d97706"  # App amber - non-section colour
  text_on_postponed = "#ffffff"
  # Joining status tokens (SPEC-06). Uniform across all palettes -
  # status semantics shouldn't shift with the site's house colours.
  status_open       = "#0a7b3a"  # Confident green - "ready to enrol"
  status_waiting    = "#b45309"  # Deeper amber - differs from --postponed
  status_closed     = "#6b7280"  # Neutral grey - section not running this term
  text_on_status    = "#ffffff"

