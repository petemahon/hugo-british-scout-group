  secondary_hover   = "#1a86f2"
  tertiary          = "#088486"  # Scouts Teal
  accent            = "#ff912a"  # Scouts Orange
  text              = "#232323"
  text_muted        = "#5a5a5a"
  text_on_primary   = "#ffffff"
  text_on_secondary = "#ffffff"
  bg                = "#ffffff"
  bg_muted          = "#f7f7f7"
  warning           = "#ed3f23"   # Scouts Red — universal stop/cancellation accent
  text_on_warning   = "#ffffff"

