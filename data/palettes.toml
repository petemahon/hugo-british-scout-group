# -----------------------------------------------------------------------------
# Vibrant - bold, youthful, high-energy.
# -----------------------------------------------------------------------------
[vibrant]
  name        = "Vibrant"
  description = "Red primary with Pink secondary. Bold, youthful, attention-grabbing."
  primary           = "#ed3f23"  # Scouts Red
  primary_hover     = "#f15d45"
  # Focus ring NOT = primary here: Scouts Red on white is only ~3.9:1, below
  # the AA 4.5:1 target SPEC-12 sets for focus indicators. Use the palette's
  # own tertiary (Scouts Purple, ~6.4:1) instead - strongly visible against
  # the red/pink scheme. Decided 2026-06-04 (SPEC-12 Q-slate).
  focus_ring        = "#7413dc"  # Scouts Purple (= tertiary)
  secondary         = "#ffb4e5"  # Scouts Pink
  secondary_hover   = "#ffc6eb"
  tertiary          = "#7413dc"  # Scouts Purple
  accent            = "#ffe627"  # Scouts Yellow
  text              = "#14110e"
  text_muted        = "#45413a"
  text_on_primary   = "#ffffff"
  text_on_secondary = "#000000"
  bg                = "#ffffff"
  bg_muted          = "#f1efe9"
  warning           = "#d4351c"  # App scarlet - distinct from Scouts Red
  text_on_warning   = "#ffffff"
  postponed         = "#d97706"  # App amber - non-section colour
  text_on_postponed = "#ffffff"
  # Joining status tokens (SPEC-06). Uniform across all palettes -
  # status semantics shouldn't shift with the site's house colours.
  status_open       = "#0a7b3a"  # Confident green - "ready to enrol"
  status_waiting    = "#b45309"  # Deeper amber - differs from --postponed
  status_closed     = "#6b7280"  # Neutral grey - section not running this term
  text_on_status    = "#ffffff"

