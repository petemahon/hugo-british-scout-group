  - complementary "Mobile phones" [ref=e105]:
    - heading "Mobile phones" [level=2] [ref=e106]
    - paragraph [ref=e107]: Phones aren't needed at camp, and we'd encourage you to leave yours at home. If you do bring one, please hand it to a leader when you arrive — we'll keep it safe and give it back at the end. Leaders carry a Group phone for emergencies, and you'll have a contact number for the whole camp, so there's always a way to reach us.
  - complementary [ref=e108]:
    - heading "Please leave at home" [level=2] [ref=e109]
    - generic [ref=e110]:
      - text: "Please leave at home:"
      - strong [ref=e111]: phones, tablets and games consoles
      - text: (see the note above), money beyond a few pounds for the tuck shop, and anything valuable or irreplaceable. Sweets and fizzy drinks stay at home too — we provide all the food.
