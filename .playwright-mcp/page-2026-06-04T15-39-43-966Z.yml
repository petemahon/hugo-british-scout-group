              - generic [ref=e43]:
                - generic [ref=e44]:
                  - term [ref=e45]: Young people
                  - definition [ref=e47]: Yes — if you live in the host country and aren't a national of it. UK, third-country and dual-national families all qualify.
                - generic [ref=e48]:
                  - term [ref=e49]: Volunteers (18+)
                  - definition [ref=e51]: Yes — anyone over 18, any nationality, including nationals of the host country.
                - generic [ref=e52]:
                  - term [ref=e53]: The canonical rule
                  - definition [ref=e55]:
                    - text: (This follows
