            - generic [ref=e36]:
              - paragraph [ref=e37]: BSO Groups operate under The Scout Association's Policy, Organisation and Rules (POR). Youth membership is open to anyone living in the host country who isn't a national of it — UK families, third-country families, dual-nationals whose other nationality isn't the host country. Volunteer membership is open to anyone over 18 regardless of nationality. The detail below explains the practical eligibility in plain English; POR 3.2.1.1 is the canonical rule.
              - link "See how to join →" [ref=e39] [cursor=pointer]:
                - /url: /join/
                - text: See how to join
                - generic [ref=e40]: →
