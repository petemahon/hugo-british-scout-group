        - text: Policies
      - generic [ref=e31]:
        - generic [ref=e32]: Policy
        - heading "Photo consent" [level=1] [ref=e33]
        - paragraph [ref=e34]: How we handle photographs of young people at 1st Anytown Scouts.
      - generic [ref=e35]:
        - generic [ref=e36]:
          - paragraph [ref=e37]: This page is the starter wording shipped with the British Scout Group theme. Replace the body below with the policy your Group has agreed with its Trustees. Nothing on this page is rendered as a legal instrument until you’ve reviewed it with your safeguarding lead.
          - heading "Why we ask" [level=2] [ref=e38]
          - paragraph [ref=e39]: Some of what we do is naturally photogenic - camps, badge presentations, parades. Sharing photos helps families see what their child has been up to and shows prospective members what life in the Group is like. We also have a duty of care to the young people in those photos.
          - heading "What we ask of parents and carers" [level=2] [ref=e40]
          - paragraph [ref=e41]: "When a young person joins, you’ll be asked to tick a photo-consent box on their OSM record. You can change your answer at any time: contact the Group Lead Volunteer and we will update the record and remove any already-published photos that include your child."
          - heading "How we use photos" [level=2] [ref=e42]
          - list [ref=e43]:
            - listitem [ref=e44]:
              - strong [ref=e45]: Our website.
              - text: Galleries on this site are reviewed by the safeguarding lead before publication. Captions never identify a young person by name.
            - listitem [ref=e46]:
              - strong [ref=e47]: Group communications.
              - text: Newsletters and Group-wide messages on the parents’ channel use the same consent setting.
            - listitem [ref=e48]:
              - strong [ref=e49]: Scouts UK and District.
              - text: Occasionally District or Headquarters ask for photos for their own publications. We tell them which records have consent and only forward those.
          - heading "What we don’t do" [level=2] [ref=e50]
          - list [ref=e51]:
            - listitem [ref=e52]: We don’t post photos on social media platforms that we don’t own (no Facebook, Instagram or TikTok presence for this Group).
            - listitem [ref=e53]: We don’t sell photos.
            - listitem [ref=e54]: We don’t embed third-party tracking on this site.
          - heading "Right to be forgotten" [level=2] [ref=e55]
          - paragraph [ref=e56]: Email the Group Lead Volunteer and we’ll remove any photo at your request, no questions asked. Removal usually takes effect within two working days.
          - heading "Where signed records are kept" [level=2] [ref=e57]
          - paragraph [ref=e58]: Signed photo-consent records are stored against each young person’s record in OSM. Paper consent forms from camps are kept by the camp leader for the duration of the activity and then logged in OSM.
