  - main [ref=e14]:
    - article [ref=e15]:
      - generic [ref=e16]:
        - generic [ref=e17]:
          - generic [ref=e18]: Our story
          - heading "Our history" [level=1] [ref=e19]
          - paragraph [ref=e20]:
            - text: Founded
            - strong [ref=e21]: "1974"
        - generic [ref=e22]:
          - generic [ref=e23]:
            - paragraph [ref=e24]: We started in 1974 with six children and two borrowed trestle tables. A pair of parents who had run Scout sections back in the UK found themselves overseas, far from the nearest Group, and decided their own children - and their friends - shouldn’t miss out. The first meetings ran in a villa majlis; within a few years we had affiliated to British Scouting Overseas and were running the same programme, and working towards the same awards, as Groups at home.
            - paragraph [ref=e25]: "Fifty years on, the shape of the Group has changed many times - new sections, new leaders, a permanent home - but the thread has held: the same Skills for Life programme, delivered by volunteers, for the children of families who happen to be living away from the UK."
            - heading "What’s stayed the same" [level=2] [ref=e26]
            - paragraph [ref=e27]: The desert camp. Since the first overnight in 1983, a night under the stars in the dunes has been the fixture the whole Group builds its year around - Squirrels watching the sunset, Explorers cooking for everyone, and leaders who first came as Beavers.
            - heading "What’s changed" [level=2] [ref=e28]
            - paragraph [ref=e29]: Families move on - that’s the nature of an overseas Group. Members we waved off have gone on to lead Scouting on four continents, and every anniversary brings a few of them back. The timeline alongside picks out the moments that got us here.
          - complementary "Group history timeline" [ref=e30]:
            - list "Group history timeline" [ref=e31]:
              - listitem [ref=e32]:
                - generic [ref=e33]: "1974"
                - generic [ref=e34]:
                  - heading "A handful of families start a Pack" [level=3] [ref=e35]
                  - paragraph [ref=e36]: Six children met in a borrowed villa majlis, run by two parents who had been Scout leaders back in the UK.
              - listitem [ref=e37]:
                - generic [ref=e38]: "1978"
                - generic [ref=e39]:
                  - heading "Registered with British Scouting Overseas" [level=3] [ref=e40]
                  - paragraph [ref=e41]: The Group formally affiliated to BSO, giving members the same programme and awards as Groups at home.
              - listitem [ref=e42]:
                - generic [ref=e43]: "1983"
                - generic [ref=e44]:
                  - heading "First desert camp" [level=3] [ref=e45]
                  - paragraph [ref=e46]: An overnight camp in the dunes became the fixture that still defines the Group's year.
              - listitem [ref=e47]:
                - generic [ref=e48]: "1991"
                - generic [ref=e49]:
                  - heading "Scout Troop opens" [level=3] [ref=e50]
                  - paragraph [ref=e51]: Growing numbers meant the older section could finally run its own programme.
              - listitem [ref=e52]:
                - generic [ref=e53]: "1999"
                - generic [ref=e54]:
                  - heading "Moved to the current HQ" [level=3] [ref=e55]
                  - paragraph [ref=e56]: A long-term home at the community centre, with storage for camp kit and a proper meeting hall.
              - listitem [ref=e57]:
                - generic [ref=e58]: "2008"
                - generic [ref=e59]:
                  - heading "Explorer Unit founded" [level=3] [ref=e60]
                  - paragraph [ref=e61]: 14-18s gained their own section, with an expedition programme across the region.
              - listitem [ref=e62]:
                - generic [ref=e63]: "2015"
                - generic [ref=e64]:
                  - heading "Squirrels and a second Cub Pack" [level=3] [ref=e65]
                  - paragraph [ref=e66]: Demand from younger families and a waiting list prompted two new sections in one busy year.
              - listitem [ref=e67]:
                - generic [ref=e68]: "2019"
                - generic [ref=e69]:
                  - heading "50 young people at summer camp" [level=3] [ref=e70]
                  - paragraph [ref=e71]: The Group's largest camp to date, with alumni leaders returning to help run it.
              - listitem [ref=e72]:
                - generic [ref=e73]: "2024"
                - generic [ref=e74]:
                  - heading "Fiftieth anniversary" [level=3] [ref=e75]
                  - paragraph [ref=e76]: Half a century of Scouting overseas, marked with a reunion of former members now scattered around the world.
