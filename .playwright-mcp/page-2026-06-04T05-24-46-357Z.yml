        - generic [ref=e22]:
          - heading "A short history" [level=2] [ref=e23]
          - paragraph [ref=e24]: 1st Anytown Scouts has been part of Anytown for over thirty years. We run five sections - Squirrels, Beavers, Cubs, Scouts and Explorers - plus a Network at city level for 18-25s. Our charity number is on the footer of every page.
          - heading "What we’re here for" [level=2] [ref=e25]
          - paragraph [ref=e26]: "Scouts gives young people skills for life: confidence, friendship, practical know-how, time outdoors, leadership. Every section does it in their own way - Squirrels through structured play, Explorers through expeditions and qualifications - but the through-line is the same."
          - heading "Where we meet" [level=2] [ref=e27]
          - paragraph [ref=e28]: The Anytown Scout Hut, 11 Hut Lane, Anytown. Map and section-by-section timings are on the home page.
