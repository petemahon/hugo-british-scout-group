        - generic [ref=e26]: Volunteer
        - heading "Volunteer with us" [level=1] [ref=e27]
        - paragraph [ref=e28]: Scouting here runs entirely on volunteers. You don't need to have been a Scout, and you don't need to commit every week - there's a role to fit most lives, including a few you can do remotely. Below are the roles we're actively looking to fill.
      - generic [ref=e29]:
        - article [ref=e30]:
          - generic [ref=e32]: Cubs
          - heading "Assistant Cub Leader" [level=3] [ref=e33]:
            - link "Assistant Cub Leader" [ref=e34] [cursor=pointer]:
              - /url: /support-us/volunteer-roles/assistant-cub-leader/
          - paragraph [ref=e35]: Wednesday evenings, term time (plus the odd weekend camp)
          - paragraph
          - paragraph [ref=e36]: "Help run our Wednesday Cub Pack: games, badge work, the occasional bit of controlled chaos, and the camps that Cubs remember for years. You’d work alongside Akela and the rest of the team - no experience needed, just reliability and a sense of humour. We’ll fund and book your training, and you’ll never be on your own with the Pack."
          - paragraph
          - paragraph [ref=e37]:
            - link "About this role →" [ref=e38] [cursor=pointer]:
              - /url: /support-us/volunteer-roles/assistant-cub-leader/
        - article [ref=e39]:
          - generic [ref=e41]: Remote OK
          - heading "Group Treasurer" [level=3] [ref=e42]:
            - link "Group Treasurer" [ref=e43] [cursor=pointer]:
              - /url: /support-us/volunteer-roles/treasurer/
          - paragraph [ref=e44]: A few hours a month, plus the AGM
          - paragraph
          - paragraph [ref=e45]: "Keep the Group’s finances healthy: pay the bills, bank the takings, keep the books, and present the accounts at the AGM. It’s a Trustee role, so it carries real responsibility - but it’s very doable remotely, which makes it a great fit for a UK-based parent or supporter who can’t get to weekly meetings. Bookkeeping or finance experience is welcome but not essential; the outgoing Treasurer will hand over thoroughly."
          - paragraph
          - paragraph [ref=e46]:
            - link "About this role →" [ref=e47] [cursor=pointer]:
              - /url: /support-us/volunteer-roles/treasurer/
        - article [ref=e48]:
          - generic [ref=e50]: Remote OK
          - heading "Trustee (Group Executive)" [level=3] [ref=e51]:
            - link "Trustee (Group Executive)" [ref=e52] [cursor=pointer]:
              - /url: /support-us/volunteer-roles/trustee/
          - paragraph [ref=e53]: Around six meetings a year
          - paragraph
          - paragraph [ref=e54]: Our Trustee Board (the Group Executive) looks after the Group’s money, property, safeguarding duties and overall direction. We’re looking for people with skills in finance, fundraising, premises, HR or law - but also just sensible people who care about local young people. Meetings can be joined online, so this works well for supporters living away from the area, including back in the UK.
          - paragraph
          - paragraph [ref=e55]:
            - link "About this role →" [ref=e56] [cursor=pointer]:
              - /url: /support-us/volunteer-roles/trustee/
