          - heading "Who can join 1st Anytown Scouts" [level=1] [ref=e21]
        - generic [ref=e22]:
          - paragraph [ref=e23]: BSO Groups operate under The Scout Association's Policy, Organisation and Rules (POR). Youth membership is open to anyone living in the host country who isn't a national of it - UK families, third-country families, dual-nationals whose other nationality isn't the host country. Volunteer membership is open to anyone over 18 regardless of nationality. The detail below explains the practical eligibility in plain English; POR 3.2.1.1 is the canonical rule.
          - generic [ref=e24]:
            - heading "Language" [level=3] [ref=e25]
            - paragraph [ref=e26]: We meet in English. Children are warmly welcomed regardless of background as long as they (or their carers) are comfortable enough in English to follow the session and the safeguarding language.
          - generic [ref=e27]:
            - heading "Nationality" [level=3] [ref=e28]
            - paragraph [ref=e29]:
              - text: Membership of British Scouting Overseas is for families who are not nationals of the United Arab Emirates. UAE nationals are warmly directed to the Emirates Scout Association - see
              - link "scouting in the UAE" [ref=e30] [cursor=pointer]:
                - /url: /bso/host-scouting/
              - text: .
          - generic [ref=e31]:
            - heading "Volunteering" [level=3] [ref=e32]
            - paragraph [ref=e33]: Volunteer membership is different. Anyone over 18 is welcome to help out, whatever your nationality - including nationals of the host country. See the volunteer page for the current roles.
          - generic [ref=e34]:
            - heading "Not eligible for BSO?" [level=3] [ref=e35]
            - paragraph [ref=e36]:
              - text: If you're a UAE national or you'd rather your child join a Scouting body that operates in Arabic, the WOSM-recognised options are listed under
              - link "scouting in the UAE" [ref=e37] [cursor=pointer]:
                - /url: /bso/host-scouting/
              - text: .
          - paragraph [ref=e38]:
