          - heading "Home range and InTouch" [level=1] [ref=e29]
        - generic [ref=e30]:
          - paragraph [ref=e31]: 1st Anytown's home range is roughly a 20 km radius around our hut. Trips beyond the home range need an InTouch form filed by the Group Scout Leader - see the summary below or read the full policy PDF.
          - paragraph [ref=e32]:
            - strong [ref=e33]: Anytown Scout Hut
            - text: · approximately 20 km
          - generic [ref=e34]:
            - heading "InTouch policy" [level=3] [ref=e35]
            - paragraph [ref=e36]: InTouch is The Scout Association's contact-tracking policy for activities away from the meeting place. We log the activity, the leader-on-call's phone, and the home contact for every camp or trip. Parents receive the on-call number before any away activity.
          - generic [ref=e37]:
            - heading "Beyond the home range" [level=3] [ref=e38]
            - paragraph [ref=e39]: Activities outside the home range - particularly cross-border or overnight activities - need a written permission form from each parent in addition to the InTouch record.
          - paragraph [ref=e41]:
            - text: This page is gated by
            - code [ref=e42]: params.bso.show_home_range
            - text: in your site’s
            - code [ref=e43]: hugo.toml
            - text: . Default is
            - strong [ref=e44]: "false"
            - text: - most BSO Groups don’t need a formal home-range publication. Flip the param to
            - code [ref=e45]: "true"
            - text: to surface the link in the
            - code [ref=e46]: /bso/
            - text: hub.
