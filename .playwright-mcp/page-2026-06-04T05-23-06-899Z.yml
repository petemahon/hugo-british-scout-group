          - paragraph [ref=e34]: Sunday morning kicked off with a downpour and a flurry of texts asking whether the parade was still on. By 10am the sun was out, the church hall was full of polished shoes, and the piper had arrived right on schedule.
          - paragraph [ref=e35]: Beavers led the way (as is tradition for our youngest), with Cubs behind, Scouts holding the colours, and Explorers bringing up the rear. The new neckers issued at investiture last week made their first formal outing, which was very smart indeed.
          - paragraph [ref=e36]: Our thanks to the parents who turned out in numbers, to the church for hosting us, and to the piper - who has politely declined our requests for an encore at every weekly meeting since.
          - paragraph [ref=e37]: Promise renewals next week.
