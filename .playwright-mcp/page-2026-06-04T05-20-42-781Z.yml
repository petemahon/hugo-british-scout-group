            - heading "Christmas Post" [level=3] [ref=e48]
            - paragraph [ref=e49]: Every December
            - paragraph [ref=e50]: Our young people sort and deliver Christmas cards across the area for a small fee per card. It's our biggest single fundraiser of the year and a brilliant community-service badge opportunity.
            - paragraph [ref=e51]:
              - link "Get involved →" [ref=e52] [cursor=pointer]:
                - /url: mailto:fundraising@1stanytown.org.uk
          - article [ref=e53]:
            - heading "100 Club" [level=3] [ref=e54]
            - paragraph [ref=e55]: Monthly draw
            - paragraph [ref=e56]: A monthly prize draw — members and parents buy a number for a few pounds a month, half the pot goes to a winner and half to the Group. Ask a leader to join.
          - article [ref=e57]:
            - heading "Bag packing & bonfire BBQ" [level=3] [ref=e58]
            - paragraph [ref=e59]: Autumn
            - paragraph [ref=e60]: Seasonal events we run with the whole Group — many hands needed, and a good excuse to get everyone together.
