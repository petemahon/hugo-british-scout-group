  - main [ref=e25]:
    - article [ref=e26]:
      - generic [ref=e27]:
        - generic [ref=e28]:
          - generic [ref=e29]: Our story
          - heading "Our history" [level=1] [ref=e30]
          - paragraph [ref=e31]:
            - text: Founded
            - strong [ref=e32]: "1974"
        - generic [ref=e33]:
          - generic [ref=e34]:
            - paragraph [ref=e35]: We started in 1974 with six children and two borrowed trestle tables. A pair of parents who had run Scout sections back in the UK found themselves overseas, far from the nearest Group, and decided their own children — and their friends — shouldn’t miss out. The first meetings ran in a villa majlis; within a few years we had affiliated to British Scouting Overseas and were running the same programme, and working towards the same awards, as Groups at home.
            - paragraph [ref=e36]: "Fifty years on, the shape of the Group has changed many times — new sections, new leaders, a permanent home — but the thread has held: the same Skills for Life programme, delivered by volunteers, for the children of families who happen to be living away from the UK."
            - heading "What’s stayed the same" [level=2] [ref=e37]
            - paragraph [ref=e38]: The desert camp. Since the first overnight in 1983, a night under the stars in the dunes has been the fixture the whole Group builds its year around — Squirrels watching the sunset, Explorers cooking for everyone, and leaders who first came as Beavers.
            - heading "What’s changed" [level=2] [ref=e39]
            - paragraph [ref=e40]: Families move on — that’s the nature of an overseas Group. Members we waved off have gone on to lead Scouting on four continents, and every anniversary brings a few of them back. The timeline alongside picks out the moments that got us here.
          - complementary "Group history timeline" [ref=e41]:
            - list "Group history timeline" [ref=e42]:
              - listitem [ref=e43]:
                - generic [ref=e44]: "1974"
                - generic [ref=e45]:
                  - heading "A handful of families start a Pack" [level=3] [ref=e46]
                  - paragraph [ref=e47]: Six children met in a borrowed villa majlis, run by two parents who had been Scout leaders back in the UK.
              - listitem [ref=e48]:
                - generic [ref=e49]: "1978"
                - generic [ref=e50]:
                  - heading "Registered with British Scouting Overseas" [level=3] [ref=e51]
                  - paragraph [ref=e52]: The Group formally affiliated to BSO, giving members the same programme and awards as Groups at home.
              - listitem [ref=e53]:
                - generic [ref=e54]: "1983"
                - generic [ref=e55]:
                  - heading "First desert camp" [level=3] [ref=e56]
                  - paragraph [ref=e57]: An overnight camp in the dunes became the fixture that still defines the Group's year.
              - listitem [ref=e58]:
                - generic [ref=e59]: "1991"
                - generic [ref=e60]:
                  - heading "Scout Troop opens" [level=3] [ref=e61]
                  - paragraph [ref=e62]: Growing numbers meant the older section could finally run its own programme.
              - listitem [ref=e63]:
                - generic [ref=e64]: "1999"
                - generic [ref=e65]:
                  - heading "Moved to the current HQ" [level=3] [ref=e66]
                  - paragraph [ref=e67]: A long-term home at the community centre, with storage for camp kit and a proper meeting hall.
              - listitem [ref=e68]:
                - generic [ref=e69]: "2008"
                - generic [ref=e70]:
                  - heading "Explorer Unit founded" [level=3] [ref=e71]
                  - paragraph [ref=e72]: 14-18s gained their own section, with an expedition programme across the region.
              - listitem [ref=e73]:
                - generic [ref=e74]: "2015"
                - generic [ref=e75]:
                  - heading "Squirrels and a second Cub Pack" [level=3] [ref=e76]
                  - paragraph [ref=e77]: Demand from younger families and a waiting list prompted two new sections in one busy year.
              - listitem [ref=e78]:
                - generic [ref=e79]: "2019"
                - generic [ref=e80]:
                  - heading "50 young people at summer camp" [level=3] [ref=e81]
                  - paragraph [ref=e82]: The Group's largest camp to date, with alumni leaders returning to help run it.
              - listitem [ref=e83]:
                - generic [ref=e84]: "2024"
                - generic [ref=e85]:
                  - heading "Fiftieth anniversary" [level=3] [ref=e86]
                  - paragraph [ref=e87]: Half a century of Scouting overseas, marked with a reunion of former members now scattered around the world.
