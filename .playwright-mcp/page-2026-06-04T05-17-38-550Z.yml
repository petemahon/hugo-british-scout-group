          - heading "Cubs Weekend Camp Kit List" [level=1] [ref=e33]
          - paragraph [ref=e34]:
            - generic [ref=e35]: v2026.1
            - generic [ref=e36]: reviewed 1 April 2026
            - generic [ref=e37]: by Akela
          - paragraph [ref=e38]:
            - link "Print this list →" [ref=e39] [cursor=pointer]:
              - /url: print.html
        - generic [ref=e40]:
          - text: Everything a Cub needs for a weekend under canvas or in a camp building. Pack it
          - strong [ref=e41]: with
          - text: "your Cub, not for them — knowing where their own kit is makes the weekend go far more smoothly. Haven't got something? Ask Akela: we keep spare sleeping bags and waterproofs to lend."
        - generic [ref=e42]:
          - generic [ref=e43]:
            - heading "Sleeping" [level=2] [ref=e44]
            - list [ref=e45]:
              - listitem [ref=e46]: Sleeping bag — Or two warm fleece blankets if no bag
              - listitem [ref=e47]: Roll mat or sleeping mat
              - listitem [ref=e48]: Pillow (small) or pillowcase to stuff with clothes
            - paragraph [ref=e49]: If you don't have a 3-season sleeping bag, contact Akela — we have spares to lend.
          - generic [ref=e50]:
            - heading "Clothing" [level=2] [ref=e51]
            - list [ref=e52]:
              - listitem [ref=e53]:
                - text: Underwear and socks
                - generic [ref=e54]: ×3
                - text: — A spare set per day, plus one extra
              - listitem [ref=e55]:
                - text: Warm jumper or fleece
                - generic [ref=e56]: ×2
              - listitem [ref=e57]:
                - text: Trousers (not jeans — they stay cold and wet)
                - generic [ref=e58]: ×2
              - listitem [ref=e59]:
                - text: T-shirts
                - generic [ref=e60]: ×2
              - listitem [ref=e61]: Waterproof coat
              - listitem [ref=e62]: Wellies — Or old trainers that can get muddy
              - listitem [ref=e63]: Pyjamas
              - listitem [ref=e64]: Warm hat and gloves — Even in summer — evenings get cold
          - generic [ref=e65]:
            - heading "Wash kit" [level=2] [ref=e66]
            - list [ref=e67]:
              - listitem [ref=e68]: Toothbrush and toothpaste
              - listitem [ref=e69]: Soap or shower gel
              - listitem [ref=e70]: Towel
          - generic [ref=e71]:
            - heading "Camp gear" [level=2] [ref=e72]
            - list [ref=e73]:
              - listitem [ref=e74]: Named water bottle
              - listitem [ref=e75]: Torch — Head torch is ideal; spare batteries help
              - listitem [ref=e76]: Sun cream and sun hat
              - listitem [ref=e77]: Plate, bowl, mug and cutlery — Only if told to bring them — we'll let you know
            - paragraph [ref=e78]: Label everything with your Cub's name — it saves a mountain of lost property on Sunday.
        - complementary "Mobile phones" [ref=e79]:
          - heading "Mobile phones" [level=2] [ref=e80]
          - paragraph [ref=e81]: Phones aren't needed at camp, and we'd encourage you to leave yours at home. If you do bring one, please hand it to a leader when you arrive — we'll keep it safe and give it back at the end. Leaders carry a Group phone for emergencies, and you'll have a contact number for the whole camp, so there's always a way to reach us.
        - complementary "Please leave at home" [ref=e82]:
          - heading "Please leave at home" [level=2] [ref=e83]
          - generic [ref=e84]:
            - text: "Please leave at home:"
            - strong [ref=e85]: phones, tablets and games consoles
            - text: (see the note above), money beyond a few pounds for the tuck shop, and anything valuable or irreplaceable. Sweets and fizzy drinks stay at home too — we provide all the food.
