          - generic [ref=e26]: Our story
          - heading "Our history" [level=1] [ref=e27]
          - paragraph [ref=e28]:
            - text: Founded
            - strong [ref=e29]: "1974"
        - generic [ref=e30]:
          - generic [ref=e31]:
            - paragraph [ref=e32]: We started in 1974 with six children and two borrowed trestle tables. A pair of parents who had run Scout sections back in the UK found themselves overseas, far from the nearest Group, and decided their own children - and their friends - shouldn’t miss out. The first meetings ran in a villa majlis; within a few years we had affiliated to British Scouting Overseas and were running the same programme, and working towards the same awards, as Groups at home.
            - paragraph [ref=e33]: "Fifty years on, the shape of the Group has changed many times - new sections, new leaders, a permanent home - but the thread has held: the same Skills for Life programme, delivered by volunteers, for the children of families who happen to be living away from the UK."
            - heading "What’s stayed the same" [level=2] [ref=e34]
            - paragraph [ref=e35]: The desert camp. Since the first overnight in 1983, a night under the stars in the dunes has been the fixture the whole Group builds its year around - Squirrels watching the sunset, Explorers cooking for everyone, and leaders who first came as Beavers.
            - heading "What’s changed" [level=2] [ref=e36]
            - paragraph [ref=e37]: Families move on - that’s the nature of an overseas Group. Members we waved off have gone on to lead Scouting on four continents, and every anniversary brings a few of them back. The timeline alongside picks out the moments that got us here.
          - complementary "Group history timeline" [ref=e38]
