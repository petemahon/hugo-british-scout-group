        - heading "Support us" [level=1] [ref=e27]
        - paragraph [ref=e28]: Subs cover the basics, but camps, equipment and keeping a roof over the hut all cost more than subs alone can carry. Every pound raised goes straight back into Scouting for local young people - and gift-aided donations go further still.
      - paragraph [ref=e30]: Thank you to everyone who supports the Group - whether by giving, by turning out to help at events, or by shopping through easyfundraising. It genuinely keeps us running.
