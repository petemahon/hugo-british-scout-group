          - paragraph [ref=e28]: We're a volunteer-run Group operating under British Scouting Overseas. A Trustee Board (our Group Executive) is responsible for our finances, our safeguarding duties and the upkeep of our equipment, and is accountable to parents at the Annual General Meeting.
