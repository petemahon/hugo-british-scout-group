          - heading "What each section does" [level=1] [ref=e33]
        - generic [ref=e34]:
          - heading "Squirrels (4–6)" [level=2] [ref=e35]
          - paragraph [ref=e36]: Our youngest section. Squirrels meet weekly for short, play-based sessions where they learn about themselves, each other, and their local community. Lots of small-group games and short structured activities.
          - heading "Beavers (6–8)" [level=2] [ref=e37]
          - paragraph [ref=e38]: Beavers run a full meeting with games, badge work and the start of the outdoor side of Scouts. By the end of Beavers most young people have slept at the hut for a night or two.
          - heading "Cubs (8–10½)" [level=2] [ref=e39]
          - paragraph [ref=e40]: Cubs is the section where adventure becomes a regular thing. Camps, hikes, cooking on a single hob, first aid, swimming, navigation. A typical Cubs term carries one camp and one community-impact activity.
          - heading "Scouts (10½–14)" [level=2] [ref=e41]
          - paragraph [ref=e42]: Patrol-led. Scouts run their own programme alongside the leaders, with a strong outdoor calendar — expeditions, weekends away, Trangia cooking, pioneering, the big camps every summer.
          - heading "Explorers (14–18)" [level=2] [ref=e43]
          - paragraph [ref=e44]: Older Explorers run their own Unit. The Duke of Edinburgh’s Award, top-tier Scout awards, international expeditions, and community impact work. Strong bridge into volunteering as adults.
