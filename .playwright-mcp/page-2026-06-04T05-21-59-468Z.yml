          - generic [ref=e32]: British Scouting Overseas
          - heading "Who can join 1st Anytown Scouts" [level=1] [ref=e33]
        - generic [ref=e34]:
          - paragraph [ref=e35]: BSO Groups operate under The Scout Association's Policy, Organisation and Rules (POR). Youth membership is open to anyone living in the host country who isn't a national of it - UK families, third-country families, dual-nationals whose other nationality isn't the host country. Volunteer membership is open to anyone over 18 regardless of nationality. The detail below explains the practical eligibility in plain English; POR 3.2.1.1 is the canonical rule.
          - generic [ref=e36]:
            - heading "Language" [level=3] [ref=e37]
            - paragraph [ref=e38]: We meet in English. Children are warmly welcomed regardless of background as long as they (or their carers) are comfortable enough in English to follow the session and the safeguarding language.
          - generic [ref=e39]:
            - heading "Nationality" [level=3] [ref=e40]
            - paragraph [ref=e41]:
              - text: Membership of British Scouting Overseas is for families who are not nationals of the United Arab Emirates. UAE nationals are warmly directed to the Emirates Scout Association - see
              - link "scouting in the UAE" [ref=e42] [cursor=pointer]:
                - /url: /bso/host-scouting/
              - text: .
          - generic [ref=e43]:
            - heading "Volunteering" [level=3] [ref=e44]
            - paragraph [ref=e45]: Volunteer membership is different. Anyone over 18 is welcome to help out, whatever your nationality - including nationals of the host country. See the volunteer page for the current roles.
          - generic [ref=e46]:
            - heading "Not eligible for BSO?" [level=3] [ref=e47]
            - paragraph [ref=e48]:
              - text: If you're a UAE national or you'd rather your child join a Scouting body that operates in Arabic, the WOSM-recognised options are listed under
              - link "scouting in the UAE" [ref=e49] [cursor=pointer]:
                - /url: /bso/host-scouting/
              - text: .
          - paragraph [ref=e50]:
            - generic [ref=e51]:
              - text: (This follows
              - link "POR 3.2.1.1" [ref=e52] [cursor=pointer]:
                - /url: https://www.scouts.org.uk/por/3-membership/32-membership/
              - text: - The Scout Association's rule for every BSO group.)
