        - generic [ref=e34]:
          - heading "A short history" [level=2] [ref=e35]
          - paragraph [ref=e36]: 1st Anytown Scouts has been part of Anytown for over thirty years. We run five sections — Squirrels, Beavers, Cubs, Scouts and Explorers — plus a Network at city level for 18-25s. Our charity number is on the footer of every page.
          - heading "What we’re here for" [level=2] [ref=e37]
          - paragraph [ref=e38]: "Scouts gives young people skills for life: confidence, friendship, practical know-how, time outdoors, leadership. Every section does it in their own way — Squirrels through structured play, Explorers through expeditions and qualifications — but the through-line is the same."
          - heading "Where we meet" [level=2] [ref=e39]
          - paragraph [ref=e40]: The Anytown Scout Hut, 11 Hut Lane, Anytown. Map and section-by-section timings are on the home page.
