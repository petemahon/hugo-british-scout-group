            - paragraph [ref=e37]: Every December
            - paragraph [ref=e38]: Our young people sort and deliver Christmas cards across the area for a small fee per card. It's our biggest single fundraiser of the year and a brilliant community-service badge opportunity.
            - paragraph [ref=e39]:
              - link "Get involved →" [ref=e40] [cursor=pointer]:
