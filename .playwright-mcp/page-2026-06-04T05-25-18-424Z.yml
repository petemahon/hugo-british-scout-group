            - paragraph [ref=e43]: Monthly draw
            - paragraph [ref=e44]: A monthly prize draw - members and parents buy a number for a few pounds a month, half the pot goes to a winner and half to the Group. Ask a leader to join.
          - article [ref=e45]:
            - heading "Bag packing & bonfire BBQ" [level=3] [ref=e46]
            - paragraph [ref=e47]: Autumn
            - paragraph [ref=e48]: Seasonal events we run with the whole Group - many hands needed, and a good excuse to get everyone together.
